services:
  # ---- Python FastAPI Backend ----
  app:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: vedio-app
    ports:
      - "5678:5678"
    volumes:
      - ./backend-py:/app:ro
      - vedio-data:/app/data
    environment:
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=veduser
      - DATABASE_PASSWORD=vedpassword
      - DATABASE_NAME=veddb
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/storage
      - STORAGE_BASE_URL=http://localhost:5678/static
      - REDIS_URL=redis://redis:6379/0
      - APP_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: vedio-db
    environment:
      POSTGRES_USER: veduser
      POSTGRES_PASSWORD: vedpassword
      POSTGRES_DB: veddb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veduser -d veddb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- MinIO (S3-compatible storage) ----
  minio:
    image: minio/minio:latest
    container_name: vedio-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ---- Redis (LLM cache + optional Celery queue) ----
  redis:
    image: redis:7-alpine
    container_name: vedio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  vedio-data:
    driver: local
  postgres-data:
    driver: local
  minio-data:
    driver: local
  redis-data:
    driver: local
