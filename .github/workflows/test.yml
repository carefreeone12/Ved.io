name: CI — Test & Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "refactor/python-migration"]

defaults:
  run:
    working-directory: backend-py

jobs:
  test:
    name: Test, Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend-py/pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint — Black format check
        run: black --check .

      - name: Lint — Ruff
        run: ruff check .

      - name: Type check — mypy
        run: mypy . --ignore-missing-imports

      - name: Security scan — Bandit
        run: bandit -r . -ll --exclude .venv,tests,alembic

      - name: Unit tests
        run: pytest tests/unit/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend-py/coverage.xml

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: .
        run: docker build -f Dockerfile.python -t ved-io-backend:${{ github.sha }} .

      - name: Test Docker healthcheck
        run: |
          docker run -d --name test-container -p 5678:5678 \
            -e DATABASE_TYPE=sqlite \
            -e DATABASE_PATH=/tmp/test.db \
            ved-io-backend:${{ github.sha }}
          sleep 10
          curl --fail http://localhost:5678/health
          docker stop test-container
